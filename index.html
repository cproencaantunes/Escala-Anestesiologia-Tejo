<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1e">
<title>Escala HTJO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--bg2:#111827;--bg3:#1a2236;--card:#161d2e;--border:#1e2d45;--accent:#3b82f6;--cyan:#06b6d4;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;--faint:#1e2d45;--mono:'DM Mono',monospace;--sans:'Syne',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overscroll-behavior:none;}

/* ONBOARDING */
#onboarding{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:24px;}
.ob-title{font-size:28px;font-weight:800;letter-spacing:-1px;text-align:center;}
.ob-title span{color:var(--accent);}
.ob-sub{font-family:var(--mono);font-size:13px;color:var(--muted);text-align:center;}
.sigla-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%;max-width:360px;}
.sigla-btn{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 4px;font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text);cursor:pointer;text-align:center;transition:all .15s;}
.sigla-btn.sel{background:var(--accent);border-color:var(--accent);color:#fff;}
.ob-confirm{width:100%;max-width:360px;background:var(--accent);border:none;border-radius:12px;padding:14px;font-family:var(--sans);font-size:15px;font-weight:700;color:#fff;cursor:pointer;opacity:0.4;pointer-events:none;transition:opacity .2s;}
.ob-confirm.ready{opacity:1;pointer-events:auto;}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,15,30,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0) 0 0;}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;}
.logo{font-size:16px;font-weight:800;letter-spacing:-0.5px;}
.logo span{color:var(--accent);}
.header-right{display:flex;align-items:center;gap:10px;}
.sigla-pill{font-family:var(--mono);font-size:12px;font-weight:500;background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:var(--accent);padding:3px 10px;border-radius:20px;cursor:pointer;}
.clock-pill{font-family:var(--mono);font-size:11px;color:var(--cyan);background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.2);padding:3px 8px;border-radius:20px;}
.nav{display:flex;border-bottom:1px solid var(--border);}
.nav-tab{flex:1;font-family:var(--mono);font-size:11px;color:var(--muted);padding:8px 4px;text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* MAIN */
.main{padding-top:calc(env(safe-area-inset-top,0px) + 100px);padding-bottom:calc(env(safe-area-inset-bottom,0px) + 24px);min-height:100%;}

/* ── MEU TURNO ── */
.next-card{margin:12px 12px 4px;background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(6,182,212,0.08));border:1px solid rgba(59,130,246,0.35);border-radius:16px;padding:14px 16px;}
.next-card.on-now{background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(16,185,129,0.05));border-color:rgba(16,185,129,0.4);}
.next-label{font-family:var(--mono);font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.on-now .next-label{color:var(--green);}
.next-time{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1;}
.on-now .next-time{color:var(--green);}
.next-meta{font-family:var(--mono);font-size:12px;color:var(--cyan);margin-top:4px;}
.next-partner{font-size:13px;color:var(--muted);margin-top:6px;}
.next-partner strong{color:var(--text);}
.section-hdr{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:14px 14px 6px;display:flex;align-items:center;gap:8px;}
.section-hdr::after{content:'';flex:1;height:1px;background:var(--border);}
.turno-card{margin:0 12px 8px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.turno-card.active-now{border-color:rgba(16,185,129,0.5);}
.turno-row{display:flex;align-items:stretch;gap:10px;padding:11px 14px;}
.turno-bar{width:3px;border-radius:2px;background:var(--accent);opacity:0.5;flex-shrink:0;}
.turno-bar.now{background:var(--green);opacity:1;}
.turno-info{flex:1;min-width:0;}
.turno-time{font-family:var(--mono);font-size:12px;color:var(--muted);}
.turno-sala{font-size:15px;font-weight:700;margin:2px 0;}
.turno-cir{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.turno-cir strong{color:var(--cyan);font-weight:600;}

/* ── SALAS AGORA ── */
.agora-grid{padding:0 12px;}
.agora-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;}
.agora-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border);}
.agora-sala{font-size:13px;font-weight:700;}
.agora-time{font-family:var(--mono);font-size:11px;color:var(--muted);}
.agora-body{padding:10px 14px;display:flex;flex-direction:column;gap:4px;}
.agora-person.cir{color:var(--text);font-weight:600;font-size:13px;}
.agora-person.ane{font-family:var(--mono);font-size:12px;color:var(--cyan);}
.agora-person.ane.me{color:var(--green);font-weight:600;}
.empty-msg{text-align:center;padding:40px 24px;color:var(--muted);font-size:13px;font-family:var(--mono);}

/* ══════════════════════════════════════
   GRELHA EQUIPA — estilo spreadsheet
══════════════════════════════════════ */
.grelha-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 0 16px;}

/* day tabs inside equipa */
.day-tabs{display:flex;gap:4px;padding:10px 12px 6px;overflow-x:auto;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.day-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.day-tab.today{border-color:var(--green);color:var(--green);}
.day-tab.today.active{background:var(--green);color:#fff;}

table.grelha{border-collapse:collapse;font-family:var(--mono);font-size:11px;min-width:100%;}
table.grelha th,table.grelha td{border:1px solid var(--border);padding:0;vertical-align:top;}

/* sticky first col */
table.grelha td.posto-cell,table.grelha th.posto-hdr{
  position:sticky;left:0;z-index:2;
  background:var(--bg3);
  min-width:90px;max-width:90px;width:90px;
}
table.grelha th.posto-hdr{background:var(--bg2);z-index:3;}

/* header row */
table.grelha thead th{
  background:var(--bg2);color:var(--muted);
  font-size:10px;text-transform:uppercase;letter-spacing:.5px;
  padding:6px 8px;white-space:nowrap;text-align:center;
}
table.grelha thead th.col-cir{color:var(--text);}
table.grelha thead th.col-ane{color:var(--cyan);}

/* posto label cell */
.posto-cell{padding:8px 8px!important;font-size:11px;font-weight:500;color:var(--text);line-height:1.3;}
.posto-cell.special{color:var(--amber);}

/* data cells */
td.col-cir,td.col-ane{min-width:96px;max-width:130px;padding:0!important;}

/* slot block inside cell */
.cell-slots{display:flex;flex-direction:column;}
.cell-slot{padding:5px 7px;border-bottom:1px solid var(--faint);line-height:1.35;}
.cell-slot:last-child{border-bottom:none;}
.slot-name{font-size:11px;color:var(--text);font-weight:500;word-break:break-word;}
.slot-name.ane-name{color:var(--cyan);}
.slot-name.ane-name.is-me{color:var(--green);font-weight:700;}
.slot-t{font-size:9px;color:var(--muted);margin-top:1px;}
td.col-cir .slot-name{color:var(--text);}
td.empty-cell{background:var(--bg);}

/* section separator */
tr.section-sep td{background:var(--bg2);padding:5px 8px!important;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--amber);font-family:var(--mono);border-top:2px solid var(--amber);}

/* highlight my ANE column */
td.col-ane .slot-name.is-me{background:rgba(16,185,129,0.1);border-radius:4px;padding:1px 3px;}

.fade-in{animation:fi .18s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.hidden{display:none!important;}
</style>
</head>
<body>

<!-- ONBOARDING -->
<div id="onboarding">
  <div class="ob-title">ESCALA <span>HTJO</span></div>
  <div class="ob-sub">Selecciona a tua sigla de anestesista</div>
  <div class="sigla-grid" id="sigla-grid"></div>
  <button class="ob-confirm" id="ob-confirm" onclick="confirmSigla()">Confirmar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="header">
    <div class="header-inner">
      <div class="logo">ESCALA <span>HTJO</span></div>
      <div class="header-right">
        <div class="sigla-pill" id="sigla-display" onclick="changeSigla()">—</div>
        <div class="clock-pill" id="clock">--:--</div>
      </div>
    </div>
    <div class="nav">
      <div class="nav-tab active" id="tab-meus" onclick="switchTab('meus')">Os meus turnos</div>
      <div class="nav-tab" id="tab-agora" onclick="switchTab('agora')">Salas agora</div>
      <div class="nav-tab" id="tab-equipa" onclick="switchTab('equipa')">Equipa</div>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
const TSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vToZJwfBSPiUBuqx5ESyqdlDusL1zWRRJIOJJhRhod4NhmGHlPwfzlUK2pLcRo8JeMO8_ypvvTDDIFx/pub?gid=164072248&single=true&output=tsv";

// ── TSV PARSER ──────────────────────────────────────────────────────────────
const SALA_MAP = {
  "Sala 1":      [2,3],  "Sala 2":      [4,5],  "Sala 3":      [6,7],
  "Sala 4":      [8,9],  "Sala 5":      [10,11], "Sala 6":      [12,13],
  "Sala 7":      [14,15],"Sala 8":      [16,17], "Sala 9":      [18,19],
  "Sala 10":     [20,21],"Angio Piso 0":[22,23], "Angio Piso 1":[24,25],
  "Imagiologia": [26,27],"Consulta":    [36,null]
};
const TJEE_COLS = [28,29,30,31,32,33,34,35];

function isTimeStr(s){
  return s && /^\d{1,2}:\d{2}/.test(s.trim());
}
function parseDate(s){
  if(!s) return null;
  s = s.trim();
  if(!s) return null;
  // Serial number (Excel/Sheets date serial like 46083)
  if(/^\d{5}$/.test(s)){
    const serial = parseInt(s);
    // Excel serial: days since 1899-12-30
    const d = new Date((serial - 25569) * 86400 * 1000);
    if(!isNaN(d)) return d.toISOString().slice(0,10);
  }
  // dd/mm/yyyy
  let m = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
  if(m){
    let y=parseInt(m[3]); if(y<100) y+=2000;
    return `${y}-${String(parseInt(m[2])).padStart(2,'0')}-${String(parseInt(m[1])).padStart(2,'0')}`;
  }
  // yyyy-mm-dd
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  // mm/dd/yyyy (US format)
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){
    // disambiguate: if first number >12, it's dd/mm
    const a=parseInt(m[1]),b=parseInt(m[2]),y=parseInt(m[3]);
    if(a>12) return `${y}-${String(b).padStart(2,'0')}-${String(a).padStart(2,'0')}`;
    return `${y}-${String(a).padStart(2,'0')}-${String(b).padStart(2,'0')}`;
  }
  // "9 de março de 2026" or similar Portuguese
  const months={janeiro:1,fevereiro:2,março:3,abril:4,maio:5,junho:6,julho:7,agosto:8,setembro:9,outubro:10,novembro:11,dezembro:12};
  m = s.toLowerCase().match(/(\d{1,2})\s+de\s+(\w+)\s+de\s+(\d{4})/);
  if(m && months[m[2]]){
    return `${m[3]}-${String(months[m[2]]).padStart(2,'0')}-${String(parseInt(m[1])).padStart(2,'0')}`;
  }
  return null;
}
function parseTime(s){
  if(!s) return null;
  s = s.trim();
  // Serial fraction (e.g. 0.3125 = 07:30)
  if(/^0\.\d+$/.test(s)){
    const frac = parseFloat(s);
    const totalMin = Math.round(frac * 24 * 60);
    const h = Math.floor(totalMin/60), mn = totalMin%60;
    return `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
  }
  // HH:MM or H:MM (possibly with seconds)
  const m = s.match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
  if(m) return `${String(parseInt(m[1])).padStart(2,'0')}:${m[2]}`;
  return null;
}
function isAneSigla(s){
  return s && /^[A-Z]{1,4}$/.test(s.trim());
}

function parseTSV(text){
  const rows = text.split('\n').map(r => r.split('\t').map(c => (c||'').trim()));
  const DATA = {}, EE = {}, PREV = {};
  let tjeeNames = null;
  let currentDay = null;
  let salaState = {};

  function flushSala(sala){
    if(salaState[sala]){
      if(!DATA[currentDay][sala]) DATA[currentDay][sala]=[];
      DATA[currentDay][sala].push({...salaState[sala]});
      salaState[sala]=null;
    }
  }
  function flushAll(){
    Object.keys(SALA_MAP).forEach(s=>flushSala(s));
  }

  // Find TJEE header rows
  let tjeeHeaderRows = [];
  rows.forEach((r,i)=>{
    if(r[28] && r[28].startsWith('TJEE')) tjeeHeaderRows.push(i);
  });
  if(tjeeHeaderRows.length>0){
    tjeeNames = {};
    TJEE_COLS.forEach(c=>{ tjeeNames[c] = rows[tjeeHeaderRows[0]][c]||`TJEE${c}`; });
  }

  const tjeeDataRows = new Set();
  tjeeHeaderRows.forEach(hr=>{
    for(let i=hr;i<=hr+5;i++) tjeeDataRows.add(i);
  });

  // DEBUG: collect info for console
  const debugDates = [];

  rows.forEach((r, i) => {
    const colA = r[0]||'';
    const colB = r[1]||'';

    // New day detection
    const d = parseDate(colA);
    if(d){
      debugDates.push({row:i, raw:colA, parsed:d});
      flushAll();
      currentDay = d;
      DATA[d] = DATA[d]||{};
      EE[d] = EE[d]||[];
      salaState = {};
    }
    if(!currentDay) return;

    // PREVENÇÃO
    if(r[28]==='PREVENÇÃO'){
      const siglaRow = rows[i+2];
      if(siglaRow){
        const sig = siglaRow[28]||'';
        if(isAneSigla(sig)) PREV[currentDay] = sig;
      }
    }

    // Skip TJEE header rows
    if(r[28] && r[28].startsWith('TJEE')) return;

    // Time row
    const t = parseTime(colB);
    if(!t) return;

    // Skip rows that are part of TJEE data blocks (no time in col B normally)
    // but still process if they have a valid time

    Object.entries(SALA_MAP).forEach(([sala,[cirC,aneC]])=>{
      const cir = r[cirC]||null;
      const ane = aneC!=null ? (r[aneC]||null) : null;
      const cirClean = cir && cir.length>1 ? cir : null;
      const aneClean = (ane && isAneSigla(ane)) ? ane : null;

      if(cirClean){
        const prev = salaState[sala];
        if(prev && prev.cir===cirClean && prev.ane===aneClean){
          salaState[sala].end = t;
        } else {
          flushSala(sala);
          salaState[sala] = {start:t, end:t, cir:cirClean, ane:aneClean};
        }
      } else {
        flushSala(sala);
      }
    });
  });
  flushAll();

  // Parse TJEE EE blocks
  const dayList = Object.keys(DATA).sort();
  const dayStartRows = {};
  rows.forEach((r,i)=>{ const d=parseDate(r[0]||''); if(d&&!dayStartRows[d]) dayStartRows[d]=i; });

  tjeeHeaderRows.forEach(hr=>{
    let blockDay = null;
    for(let di=dayList.length-1;di>=0;di--){
      const ds = dayStartRows[dayList[di]];
      if(ds!==undefined && ds<=hr){ blockDay=dayList[di]; break; }
    }
    if(!blockDay) return;

    const dayTjee = tjeeHeaderRows.filter(h=>{
      for(let di=dayList.length-1;di>=0;di--){
        const ds=dayStartRows[dayList[di]];
        if(ds!==undefined&&ds<=h){ return dayList[di]===blockDay; }
      }
      return false;
    });
    const periodoIdx = dayTjee.indexOf(hr);
    const periodo = periodoIdx===0?'Manhã':'Tarde';

    if(!EE[blockDay]) EE[blockDay]=[];
    TJEE_COLS.forEach(c=>{
      const medico = rows[hr+2]?.[c]||'';
      if(!medico || medico.length<2) return;
      const horario = (rows[hr+3]?.[c]||'').replace(/^(\d{2}:\d{2}):\d{2}$/,'$1');
      const nexames = rows[hr+4]?.[c]||'';
      const ane = rows[hr+5]?.[c]||'';
      EE[blockDay].push({
        sala: tjeeNames?.[c]||`TJEE${c}`,
        periodo,
        medico,
        horario,
        nexames,
        ane: isAneSigla(ane)?ane:null
      });
    });
  });

  // Sunday prevention (after last day rows)
  const lastDay = dayList[dayList.length-1];
  const lastDayRow = dayStartRows[lastDay]||0;
  for(let i=lastDayRow+1;i<rows.length;i++){
    if(rows[i][28]==='PREVENÇÃO'){
      const sig=(rows[i+2]?.[28]||'');
      if(isAneSigla(sig)){
        const ld=new Date(lastDay+'T12:00:00');
        ld.setDate(ld.getDate()+1);
        PREV[ld.toISOString().slice(0,10)]=sig;
      }
      break;
    }
  }

  console.log('Parsed days:', dayList);
  console.log('Date debug:', debugDates);
  console.log('PREV:', PREV);
  return {DATA, EE, PREV};
}

// ── LOADING STATE ───────────────────────────────────────────────────────────
let DATA={}, EE={}, PREV={};
let dataLoaded=false;

function showLoading(){
  const main=document.getElementById('main');
  if(main) main.innerHTML='<div class="empty-msg" style="padding-top:60px">A carregar escala...<br><span style="font-size:11px;color:var(--muted)">A ler Google Sheets</span></div>';
}
function showError(msg){
  const main=document.getElementById('main');
  if(main) main.innerHTML=`<div class="empty-msg" style="padding-top:60px;color:var(--red)">${msg}</div>`;
}

async function loadData(){
  try{
    showLoading();
    const res = await fetch(TSV_URL, {cache:'no-store'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const parsed = parseTSV(text);
    DATA = parsed.DATA;
    EE = parsed.EE;
    PREV = parsed.PREV;
    dataLoaded = true;
    render();
  } catch(e){
    showError('Erro ao carregar a escala.\n'+e.message);
  }
}

const ALL_SIGLAS=["ACS","AF","AP","ARC","CA","CB","CC","CP","DC","DH","DM","DS","EB","HS","JB","JD","LR","MG","MJ","ML","MM","MSM","MV","PP","RSB","SR","TC","TN","VB","ZCN"];
const DAYS=[...new Set([...Object.keys(DATA),...Object.keys(PREV)])].sort();
const TODAY=new Date().toISOString().slice(0,10);
const DPT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MPT=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

const BLOCO=['Sala 1','Sala 2','Sala 3','Sala 4','Sala 5','Sala 6','Sala 7','Sala 8','Sala 9','Sala 10','Angio Piso 0','Angio Piso 1','Imagiologia'];
const ESPECIAIS=['TJEE 1,02','TJEE1,03','TJEE1,04','TJEE1,05','TJEE1,06','TJEE1,07','TJEE1,08','TJEE1,09'];
const CONSULTA=['Consulta'];

let ME=localStorage.getItem('sigla')||null;
let activeTab='meus';
let equipaDay=DAYS.includes(TODAY)?TODAY:DAYS[0];

// ── UTILS ──
function toM(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function nowM(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function isCur(s,d){if(d!==TODAY)return false;const n=nowM();return n>=toM(s.start)&&n<=toM(s.end)+29;}
function fmtD(d){const dt=new Date(d+'T12:00:00');return`${DPT[dt.getDay()]} ${dt.getDate()}`;}
function fmtDLong(d){const dt=new Date(d+'T12:00:00');return`${DPT[dt.getDay()]} ${dt.getDate()} ${MPT[dt.getMonth()]}`;}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1).toLowerCase():'';}

// ── ONBOARDING ──
function buildOnboarding(){
  const grid=document.getElementById('sigla-grid');
  ALL_SIGLAS.forEach(s=>{
    const b=document.createElement('button');b.className='sigla-btn';b.textContent=s;
    b.onclick=()=>{grid.querySelectorAll('.sigla-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');document.getElementById('ob-confirm').classList.add('ready');};
    grid.appendChild(b);
  });
}
function confirmSigla(){
  const sel=document.querySelector('.sigla-btn.sel');if(!sel)return;
  ME=sel.textContent;localStorage.setItem('sigla',ME);
  document.getElementById('onboarding').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sigla-display').textContent=ME;
  loadData();scheduleNotification();
}
function changeSigla(){
  document.getElementById('onboarding').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  setTimeout(()=>{document.querySelectorAll('.sigla-btn').forEach(b=>{b.classList.toggle('sel',b.textContent===ME);});document.getElementById('ob-confirm').classList.add('ready');},50);
}

// ── CLOCK ──
function tickClock(){const n=new Date();document.getElementById('clock').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}

// ── MEUS TURNOS ──
function getMyShifts(){
  const s=[];
  DAYS.forEach(d=>{
    const dd=DATA[d];if(!dd)return;
    Object.entries(dd).forEach(([sala,slots])=>{slots.forEach(slot=>{if(slot.ane===ME)s.push({d,sala,...slot});});});
    if(PREV[d]===ME) s.push({d,sala:'Prevenção',start:'',end:'',cir:null,ane:ME,isPrev:true});
  });
  return s.sort((a,b)=>a.d.localeCompare(b.d)||a.start.localeCompare(b.start));
}
function getNextShift(shifts){
  const n=nowM();
  const cur=shifts.find(s=>s.d===TODAY&&n>=toM(s.start)&&n<=toM(s.end)+29);if(cur)return{...cur,status:'now'};
  const nt=shifts.find(s=>s.d===TODAY&&toM(s.start)>n);if(nt)return{...nt,status:'next'};
  const f=shifts.find(s=>s.d>TODAY);if(f)return{...f,status:'future'};
  return null;
}
function renderMeusTurnos(){
  const frag=document.createDocumentFragment();
  const shifts=getMyShifts();const next=getNextShift(shifts);
  if(next){
    const h=document.createElement('div');h.className='next-card'+(next.status==='now'?' on-now':'');
    const lbl=next.status==='now'?'● Em serviço agora':next.status==='next'?'Próximo turno hoje':'Próximo turno';
    h.innerHTML=`<div class="next-label">${lbl}</div><div class="next-time">${next.start}–${next.end}</div><div class="next-meta">${next.d===TODAY?'Hoje':fmtD(next.d)} · ${next.sala}</div>${next.cir?`<div class="next-partner">Cirurgião: <strong>${next.cir}</strong></div>`:''}`;
    frag.appendChild(h);
  }
  const byDay={};shifts.forEach(s=>{if(!byDay[s.d])byDay[s.d]=[];byDay[s.d].push(s);});
  Object.entries(byDay).forEach(([d,ss])=>{
    const hdr=document.createElement('div');hdr.className='section-hdr';hdr.textContent=d===TODAY?`Hoje — ${fmtDLong(d)}`:fmtDLong(d);frag.appendChild(hdr);
    ss.forEach(s=>{
      const cur=isCur(s,s.d);
      const c=document.createElement('div');c.className='turno-card fade-in'+(cur?' active-now':'');
      c.innerHTML=`<div class="turno-row"><div class="turno-bar${cur?' now':''}"></div><div class="turno-info"><div class="turno-time">${s.start}–${s.end}</div><div class="turno-sala">${s.sala}</div><div class="turno-cir">${s.cir?`Cirurgião: <strong>${s.cir}</strong>`:'<em style="color:var(--faint)">Sem cirurgião</em>'}</div></div></div>`;
      frag.appendChild(c);
    });
  });
  if(!shifts.length){const e=document.createElement('div');e.className='empty-msg';e.innerHTML=`Sem turnos para <strong>${ME}</strong> esta semana.`;frag.appendChild(e);}
  return frag;
}

// ── SALAS AGORA ──
function renderSalasAgora(){
  const frag=document.createDocumentFragment();
  const n=nowM();const dd=DATA[TODAY];
  const hdr=document.createElement('div');hdr.className='section-hdr';const dt=new Date();hdr.textContent=`Agora · ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;frag.appendChild(hdr);
  if(!dd){const e=document.createElement('div');e.className='empty-msg';e.textContent='Sem dados para hoje.';frag.appendChild(e);return frag;}
  const grid=document.createElement('div');grid.className='agora-grid';let count=0;
  [...BLOCO,...ESPECIAIS].filter(sala=>dd[sala]).forEach(sala=>{
    const active=dd[sala].filter(s=>n>=toM(s.start)&&n<=toM(s.end)+29);
    if(!active.length)return;count++;
    active.forEach(s=>{
      const isMe=s.ane===ME;
      const c=document.createElement('div');c.className='agora-card fade-in';c.style.borderColor=isMe?'rgba(16,185,129,0.5)':'';
      c.innerHTML=`<div class="agora-head"><span class="agora-sala">${sala}${isMe?' <span style="color:var(--green);font-size:11px">● eu</span>':''}</span><span class="agora-time">${s.start}–${s.end}</span></div><div class="agora-body">${s.cir?`<div class="agora-person cir">${s.cir}</div>`:''}<div class="agora-person ane${isMe?' me':''}">Anest: ${s.ane||'—'}</div></div>`;
      grid.appendChild(c);
    });
  });
  if(!count){const e=document.createElement('div');e.className='empty-msg';e.textContent='Nenhuma sala activa agora.';grid.appendChild(e);}
  frag.appendChild(grid);return frag;
}

// ── GRELHA EQUIPA ──
function periodoLabel(start){
  const h=parseInt(start.split(':')[0],10);
  return h<13?'Manhã':'Tarde';
}

function mkCellSlots(slots, type, isConsulta){
  if(!slots||!slots.length) return '<td class="col-'+type+' empty-cell"></td>';
  let html='<td class="col-'+type+'"><div class="cell-slots">';
  slots.forEach(s=>{
    const val = type==='cir' ? s.cir : s.ane;
    const timeLabel = isConsulta ? periodoLabel(s.start) : s.start+'–'+s.end;
    if(!val){html+=`<div class="cell-slot"><span class="slot-name" style="color:var(--faint)">—</span><div class="slot-t">${timeLabel}</div></div>`;return;}
    const isMe = type==='ane' && val===ME;
    html+=`<div class="cell-slot"><span class="slot-name${type==='ane'?' ane-name':''}${isMe?' is-me':''}">${val}</span><div class="slot-t">${timeLabel}</div></div>`;
  });
  html+='</div></td>';
  return html;
}

function buildEECell(slots, type){
  // slots = EE entries for one sala+periodo combo
  if(!slots||!slots.length) return '<td class="empty-cell"></td>';
  let html='<td class="col-'+type+'"><div class="cell-slots">';
  slots.forEach(s=>{
    if(type==='cir'){
      html+=`<div class="cell-slot"><span class="slot-name">${s.medico}</span><div class="slot-t">${s.horario||s.periodo} · ${s.nexames}</div></div>`;
    } else {
      const isMe=s.ane===ME;
      const val=s.ane||'—';
      html+=`<div class="cell-slot"><span class="slot-name ane-name${isMe?' is-me':''}">${val}</span><div class="slot-t">${s.periodo}</div></div>`;
    }
  });
  html+='</div></td>';
  return html;
}

function buildGrelha(d){
  const dd=DATA[d]||{};
  const ee=EE[d]||[];
  const wrap=document.createElement('div');wrap.className='grelha-wrap';
  let html='<table class="grelha"><thead><tr><th class="posto-hdr">Posto</th><th class="col-cir">Cirurgião</th><th class="col-ane">Anestesista</th></tr></thead><tbody>';

  // BLOCO section — only show if there's any activity
  const blocoAtivo=BLOCO.some(sala=>dd[sala]&&dd[sala].length);
  if(blocoAtivo){
    html+='<tr class="section-sep"><td colspan="3">Bloco Operatório</td></tr>';
    BLOCO.forEach(sala=>{
      const slots=dd[sala];
      const isSpecial=sala.startsWith('Angio')||sala==='Imagiologia';
      if(!slots||!slots.length){
        html+=`<tr><td class="posto-cell${isSpecial?' special':''}">${sala}</td><td class="empty-cell"></td><td class="empty-cell"></td></tr>`;
        return;
      }
      html+=`<tr><td class="posto-cell${isSpecial?' special':''}">${sala}</td>${mkCellSlots(slots,'cir',false)}${mkCellSlots(slots,'ane',false)}</tr>`;
    });
  }

  // PREVENÇÃO row
  html+='<tr class="section-sep" style="border-top-color:var(--purple)"><td colspan="3" style="color:var(--purple)">Prevenção · 21h00</td></tr>';
  html+='<tr><td class="posto-cell" style="color:var(--purple)">ANE Prevenção</td>';
  const prevAne=PREV[d]||null;
  const prevIsMe=prevAne===ME;
  html+=`<td class="empty-cell"></td><td class="col-ane"><div class="cell-slots"><div class="cell-slot"><span class="slot-name ane-name${prevIsMe?' is-me':''}">${prevAne||'—'}</span></div></div></td></tr>`;

  // EXAMES ESPECIAIS section — rows = TJEE sala, cols = CIR(médico) | ANE, split manhã/tarde
  const eeSalas=[...new Set(ee.map(e=>e.sala))].sort();
  if(eeSalas.length){
    html+='<tr class="section-sep"><td colspan="3">Exames Especiais</td></tr>';
    // Two sub-header rows: Manhã | Tarde, each with CIR+ANE
    html+='<tr><th class="posto-hdr"></th><th class="col-cir" style="font-size:10px;color:var(--muted);text-align:center">Médico · Manhã / Tarde</th><th class="col-ane" style="font-size:10px;color:var(--cyan);text-align:center">Anest · Manhã / Tarde</th></tr>';
    eeSalas.forEach(sala=>{
      const manha=ee.filter(e=>e.sala===sala&&e.periodo==='Manhã');
      const tarde=ee.filter(e=>e.sala===sala&&e.periodo==='Tarde');
      const allSlots=[...manha,...tarde];
      html+=`<tr><td class="posto-cell special">${sala}</td>${buildEECell(allSlots,'cir')}${buildEECell(allSlots,'ane')}</tr>`;
    });
  }

  // CONSULTA section
  const consulta=dd['Consulta'];
  if(consulta&&consulta.length){
    html+='<tr class="section-sep"><td colspan="3">Consulta</td></tr>';
    html+=`<tr><td class="posto-cell">Consulta</td>${mkCellSlots(consulta,'cir',true)}${mkCellSlots(consulta,'ane',true)}</tr>`;
  }

  html+='</tbody></table>';
  wrap.innerHTML=html;
  return wrap;
}

function renderEquipa(){
  const frag=document.createDocumentFragment();

  // Day tabs
  const tabs=document.createElement('div');tabs.className='day-tabs';
  DAYS.forEach(d=>{
    const isT=d===TODAY;
    const dt=new Date(d+'T12:00:00');
    const lbl=isT?'Hoje':`${DPT[dt.getDay()]} ${dt.getDate()}`;
    const t=document.createElement('button');
    t.className='day-tab'+(isT?' today':'')+(d===equipaDay?' active':'');
    t.textContent=lbl;
    t.onclick=()=>{equipaDay=d;renderEquipa&&render();};
    tabs.appendChild(t);
  });
  frag.appendChild(tabs);

  // Date label
  const lbl=document.createElement('div');lbl.className='section-hdr';lbl.textContent=fmtDLong(equipaDay);frag.appendChild(lbl);

  // Grid
  frag.appendChild(buildGrelha(equipaDay));
  return frag;
}

// ── NOTIFICATIONS ──
function scheduleNotification(){
  if(!('Notification' in window)||!ME)return;
  if(Notification.permission==='default'){Notification.requestPermission();return;}
  if(Notification.permission!=='granted')return;
  const shifts=getMyShifts();const n=nowM();
  const soon=shifts.find(s=>s.d===TODAY&&toM(s.start)>n&&toM(s.start)-n<=30);
  if(!soon)return;
  const mins=toM(soon.start)-n;
  setTimeout(()=>new Notification(`Turno em ${mins} min`,{body:`${soon.sala} · ${soon.start}–${soon.end}${soon.cir?' · '+soon.cir:''}`}),(mins-5)*60*1000);
}

// ── TABS ──
function switchTab(t){
  activeTab=t;
  ['meus','agora','equipa'].forEach(id=>document.getElementById('tab-'+id).classList.toggle('active',id===t));
  render();
}

// ── RENDER ──
function render(){
  const main=document.getElementById('main');main.innerHTML='';
  if(activeTab==='meus')main.appendChild(renderMeusTurnos());
  else if(activeTab==='agora')main.appendChild(renderSalasAgora());
  else main.appendChild(renderEquipa());
}

// ── INIT ──
buildOnboarding();tickClock();setInterval(tickClock,30000);setInterval(()=>{if(activeTab!=='equipa')render();},60000);
setInterval(()=>{if(dataLoaded)loadData();},300000);
if(ME){document.getElementById('onboarding').classList.add('hidden');document.getElementById('app').classList.remove('hidden');document.getElementById('sigla-display').textContent=ME;loadData();scheduleNotification();}
</script>
</body>
</html>
